<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A1633" />
      <stop offset="100%" stop-color="#050a18" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37" />
      <stop offset="50%" stop-color="#FDE08B" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>
  
  <rect width="512" height="512" fill="url(#bg)" rx="112"/>
  
  <g filter="url(#shadow)">
    <circle cx="256" cy="256" r="180" fill="none" stroke="url(#gold)" stroke-width="8" opacity="0.4"/>
    <circle cx="256" cy="256" r="150" fill="none" stroke="url(#gold)" stroke-width="24"/>
    <text x="50%" y="53%" font-family="system-ui, -apple-system, sans-serif" font-size="130" font-weight="900" fill="url(#gold)" dominant-baseline="middle" text-anchor="middle" letter-spacing="6">BRQ</text>
  </g>
</svg>
