<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Midnight Blue Premium Gradient Background -->
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="60%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Shiny Luxury Gold Gradients -->
    <linearGradient id="gold-bright" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="20%" stop-color="#fde047" />
      <stop offset="50%" stop-color="#eab308" />
      <stop offset="80%" stop-color="#a16207" />
      <stop offset="100%" stop-color="#422006" />
    </linearGradient>

    <linearGradient id="gold-dark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="30%" stop-color="#d97706" />
      <stop offset="70%" stop-color="#78350f" />
      <stop offset="100%" stop-color="#451a03" />
    </linearGradient>

    <linearGradient id="gold-accent" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <filter id="shadow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.8"/>
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="ambient-glow">
      <feGaussianBlur stdDeviation="30" result="blur" />
    </filter>
  </defs>

  <!-- Base -->
  <rect width="512" height="512" fill="url(#bg)" rx="112" />
  
  <!-- Decorative Grid / Lines for Tech Feel -->
  <g opacity="0.05">
    <path d="M 0 100 L 512 100 M 0 200 L 512 200 M 0 300 L 512 300 M 0 400 L 512 400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100 0 L 100 512 M 200 0 L 200 512 M 300 0 L 300 512 M 400 0 L 400 512" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Ambient light pulse in center -->
  <circle cx="256" cy="220" r="120" fill="#facc15" opacity="0.15" filter="url(#ambient-glow)" />

  <!-- The Main Icon Mark - Abstract Dynamic W / Diamond Structure -->
  <g filter="url(#shadow-heavy)" transform="translate(51.2, -45) scale(0.8)">
    <!-- Back wing / facet -->
    <path d="M 256 70 L 360 170 L 256 340 Z" fill="url(#gold-dark)" opacity="0.9" />
    <path d="M 256 70 L 152 170 L 256 340 Z" fill="url(#gold-dark)" opacity="0.7" />
    
    <!-- Front dynamic overlapping ribbon (The 'W' and 'B' abstract combination) -->
    <path d="M 130 190 L 210 110 L 256 160 L 302 110 L 382 190 L 256 370 Z" fill="url(#gold-bright)" />
    
    <!-- Inner glowing facet -->
    <path d="M 210 110 L 256 160 L 302 110 L 256 220 Z" fill="url(#gold-accent)" filter="url(#glow)"/>
    
    <!-- Central Diamond / Star core -->
    <path d="M 256 140 L 275 200 L 256 260 L 237 200 Z" fill="#fef08a" filter="url(#glow)" />
    
    <!-- Thin energetic line surrounding the logo -->
    <path d="M 256 40 L 400 180 L 256 400 L 112 180 Z" fill="none" stroke="url(#gold-bright)" stroke-width="2" opacity="0.5" filter="url(#glow)" />
  </g>

  <!-- Text Section -->
  <g transform="translate(0, 15)">
    <!-- BRQ English Logo -->
    <text x="256" y="360" font-family="'Inter', system-ui, sans-serif" font-size="80" font-weight="900" fill="url(#gold-bright)" text-anchor="middle" letter-spacing="6" filter="url(#glow)">BRQ</text>
    
    <!-- Arabic Company Name with classic styling -->
    <text x="256" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#e2e8f0" text-anchor="middle" letter-spacing="0">شركة الوفاء</text>
    
    <!-- Decorative dots under text -->
    <circle cx="256" cy="480" r="4" fill="#facc15" opacity="0.6" />
    <circle cx="230" cy="480" r="3" fill="#facc15" opacity="0.3" />
    <circle cx="282" cy="480" r="3" fill="#facc15" opacity="0.3" />
  </g>
</svg>
