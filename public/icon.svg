<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Midnight Blue Premium Gradient Background -->
    <radialGradient id="bg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="60%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    
    <!-- Shiny Luxury Gold Gradients -->
    <linearGradient id="gold-bright" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="20%" stop-color="#fde047" />
      <stop offset="50%" stop-color="#eab308" />
      <stop offset="80%" stop-color="#a16207" />
      <stop offset="100%" stop-color="#422006" />
    </linearGradient>

    <linearGradient id="gold-dark" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="30%" stop-color="#d97706" />
      <stop offset="70%" stop-color="#78350f" />
      <stop offset="100%" stop-color="#451a03" />
    </linearGradient>

    <linearGradient id="gold-accent" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>

    <filter id="shadow-heavy" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-color="#000000" flood-opacity="0.9"/>
    </filter>
    
    <filter id="text-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.8"/>
    </filter>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="ambient-glow">
      <feGaussianBlur stdDeviation="30" result="blur" />
    </filter>

    <!-- Master Wing Definition (Left Wing) -->
    <g id="detailed-wing">
      <!-- Darkest back feathers (Long, sweeping down & inwards) -->
      <path d="M 230 120 
               C 150 40, 40 40, -10 100 
               Q 40 120, 0 200 
               Q 60 170, 30 280 
               Q 90 230, 70 360 
               Q 130 280, 120 430 
               Q 170 330, 175 450 
               Q 210 360, 230 280 Z" fill="url(#gold-dark)"/>
               
      <!-- Mid feathers -->
      <path d="M 225 130 
               C 160 60, 60 60, 15 115 
               Q 55 130, 25 205 
               Q 75 180, 55 275 
               Q 110 235, 95 355 
               Q 145 285, 145 405 
               Q 185 335, 225 260 Z" fill="url(#gold-accent)"/>

      <!-- Inner bright feathers -->
      <path d="M 220 140 
               C 170 80, 80 80, 40 130 
               Q 70 140, 50 205 
               Q 90 185, 80 265 
               Q 125 230, 125 335 
               Q 160 280, 220 240 Z" fill="url(#gold-bright)"/>

      <!-- Top cover / soft feathers -->
      <path d="M 215 150 
               C 180 100, 100 100, 65 145 
               Q 85 150, 75 200 
               Q 105 185, 105 245 
               Q 140 215, 215 220 Z" fill="#fef08a"/>
               
      <!-- Subtle highlight on the upper curve -->
      <path d="M 230 120 C 150 40, 40 40, -10 100 C 60 30, 160 30, 230 115 Z" fill="#ffffff" opacity="0.3"/>
    </g>
  </defs>

  <!-- Base -->
  <rect width="512" height="512" fill="url(#bg)" rx="112" />
  
  <!-- Decorative Grid / Lines for Tech Feel -->
  <g opacity="0.05">
    <path d="M 0 100 L 512 100 M 0 200 L 512 200 M 0 300 L 512 300 M 0 400 L 512 400" stroke="#ffffff" stroke-width="1" />
    <path d="M 100 0 L 100 512 M 200 0 L 200 512 M 300 0 L 300 512 M 400 0 L 400 512" stroke="#ffffff" stroke-width="1" />
  </g>

  <!-- Ambient light pulse in center -->
  <circle cx="256" cy="256" r="180" fill="#facc15" opacity="0.2" filter="url(#ambient-glow)" />

  <g transform="translate(0, 0)">
    <!-- Epic Flowing Wings Mark -->
    <g filter="url(#shadow-heavy)">
      <!-- Left Wing -->
      <use href="#detailed-wing" transform="translate(0, 10) scale(1)"/>
      <!-- Right Wing -->
      <use href="#detailed-wing" transform="translate(512, 10) scale(-1, 1)" />
    </g>

    <!-- Intense glowing radiant sun in the center to highlight black text -->
    <circle cx="256" cy="270" r="150" fill="#fef08a" filter="url(#ambient-glow)" opacity="0.8" />
    <circle cx="256" cy="270" r="100" fill="#ffffff" filter="url(#glow)" opacity="0.9" />

    <!-- Center Crest / Accent Binding the Wings -->
    <path d="M 256 80 L 290 140 L 256 180 L 222 140 Z" fill="url(#gold-dark)" opacity="0.9" filter="url(#shadow-heavy)"/>
    <path d="M 256 100 L 275 140 L 256 165 L 237 140 Z" fill="url(#gold-bright)" filter="url(#glow)"/>

    <!-- Text Section (Huge and Black) -->
    <!-- BRQ English Logo -->
    <text x="256" y="260" font-family="'Inter', system-ui, sans-serif" font-size="120" font-weight="900" fill="#020617" text-anchor="middle" letter-spacing="8" filter="url(#text-shadow)">BRQ</text>
    
    <!-- Arabic Company Name with classic styling -->
    <text x="256" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="#020617" text-anchor="middle" letter-spacing="0" filter="url(#text-shadow)">شركة الوفاء</text>
    
    <!-- Decorative dots under text -->
    <circle cx="256" cy="410" r="6" fill="#020617" opacity="0.8" filter="url(#text-shadow)" />
    <circle cx="215" cy="410" r="4" fill="#020617" opacity="0.5" filter="url(#text-shadow)" />
    <circle cx="297" cy="410" r="4" fill="#020617" opacity="0.5" filter="url(#text-shadow)" />
  </g>
</svg>
